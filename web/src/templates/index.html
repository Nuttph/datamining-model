<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <title>Animal Risk AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body class="bg-light">

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow-sm">
                    <div class="card-header bg-primary text-white">
                        <h4 class="mb-0">🤖 วินิจฉัยความเสี่ยงสุขภาพสัตว์</h4>
                    </div>
                    <div class="card-body">
                        <form id="riskForm">
                            <div class="mb-4">
                                <label class="form-label fw-bold">1. เลือกกลุ่มสัตว์</label>
                                <select id="animalGroup" class="form-select search-select" required>
                                    <option value="">--- ค้นหาหรือเลือกกลุ่มสัตว์ ---</option>
                                    {% for key, val in animal_data.items() %}
                                    <option value="{{ key }}">{{ val.th }}</option>
                                    {% endfor %}
                                </select>
                            </div>

                            <div class="mb-4">
                                <label class="form-label fw-bold">2. ระบุอาการ (เลือกได้หลายอย่างและค้นหาได้)</label>
                                <select id="symptoms" class="form-select search-select" multiple="multiple">
                                    {% for key, val in symptom_data.items() %}
                                    <option value="{{ key }}">{{ val }} ({{ key }})</option>
                                    {% endfor %}
                                </select>
                                <div class="form-text">สามารถพิมพ์ค้นหาอาการเป็นภาษาอังกฤษได้</div>
                            </div>

                            <button type="submit" class="btn btn-success w-100 py-2">วิเคราะห์ความเสี่ยง</button>
                        </form>

                        <div id="resultArea" class="mt-4 text-center d-none">
                            <hr>
                            <h5>ระดับความเสี่ยง</h5>
                            <div id="riskGauge" class="display-3 fw-bold">0%</div>
                            <p id="riskText" class="mt-2"></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>

</html>
