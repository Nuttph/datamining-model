
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animal Risk Predictor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="background-animation"></div>
    
    <div class="container">
        <header>
            <h1><span class="gradient-text">Animal Risk</span> Predictor</h1>
            <p>Select symptoms to assess the potential danger level of an animal.</p>
        </header>

        <main class="glass-card">
            <div class="form-group">
                <label for="model-select">Choose Intelligence Model</label>
                <div class="custom-select-wrapper">
                    <select id="model-select">
                        <option value="randomforest">Random Forest (Recommended)</option>
                        <option value="decision_tree">Decision Tree</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>Select Symptoms (Thai)</label>
                <div class="searchable-dropdown" id="symptom-dropdown">
                    <div class="selected-items" id="selected-list">
                        <span class="placeholder">Search and select symptoms...</span>
                    </div>
                    <div class="dropdown-content">
                        <div class="search-box">
                            <input type="text" id="symptom-search" placeholder="Search symptom...">
                        </div>
                        <ul id="symptoms-list">
                            {% for symptom in symptoms %}
                            <li data-value="{{ symptom }}">{{ symptom }}</li>
                            {% endfor %}
                        </ul>
                    </div>
                </div>
            </div>

            <button id="predict-btn" class="primary-btn">Analyze Risk</button>

            <div id="result-container" class="result-container hidden">
                <div class="result-header">
                    <h3>Analysis Result</h3>
                </div>
                <div class="result-content">
                    <div class="risk-indicator" id="risk-box">
                        <span id="risk-label">---</span>
                    </div>
                    <div class="gauge-container">
                        <div class="gauge">
                            <div class="gauge-fill" id="gauge-fill"></div>
                            <div class="gauge-cover"></div>
                        </div>
                        <span id="confidence-text">Confidence: 0%</span>
                    </div>
                </div>
            </div>
        </main>

        <footer>
            <p>TAPO AI Smart Guard &copy; 2026</p>
        </footer>
    </div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
