<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animal Risk AI | ระบบพยากรณ์ความเสี่ยง</title>
    <!-- Favicon would go here -->

    <!-- Select2 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>
    <div class="app-wrapper">
        <!-- Sidebar: Symptoms Selection -->
        <aside class="symptoms-sidebar">
            <div class="sidebar-header">
                <h3>🩺 อาการที่พบ</h3>
                <div class="search-box">
                    <input type="text" id="symptomSearch" placeholder="ค้นหาอาการ...">
                    <i class="search-icon">🔍</i>
                </div>
            </div>
            <div class="symptoms-list-wrapper">
                <div id="symptomsList" class="symptoms-list">
                    {% for key, val in symptom_data.items() %}
                    <label class="symptom-item" data-search="{{ val }} {{ key }}">
                        <input type="checkbox" name="symptoms_check" value="{{ key }}" class="symptom-checkbox">
                        <span class="checkbox-custom"></span>
                        <span class="symptom-label">
                            <span class="th">{{ val }}</span>
                            <span class="en">{{ key }}</span>
                        </span>
                    </label>
                    {% endfor %}
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="main-card">
                <h1>🐾 Animal Risk AI</h1>
                <p class="subtitle">ระบบวินิจฉัยความเสี่ยงสุขภาพสัตว์ด้วยปัญญาประดิษฐ์</p>

                <form id="riskForm">
                    <div class="form-section">
                        <label class="form-label">
                            <span class="step-num">1</span>
                            เลือกชนิดสัตว์
                        </label>
                        <select id="animalGroup" class="form-select search-select" required>
                            <option value="">--- ค้นหาหรือเลือกชนิดสัตว์ ---</option>
                            {% for group_key, group_val in animal_data.items() %}
                            <optgroup label="{{ group_val.th }}">
                                {% for species in group_val.members_th %}
                                <option value="{{ species }}">{{ species }}</option>
                                {% endfor %}
                            </optgroup>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="form-section">
                        <label class="form-label">
                            <span class="step-num">2</span>
                            อาการที่เลือกแล้ว
                        </label>
                        <div id="selectedSymptomsDisplay" class="selected-symptoms-container">
                            <span class="placeholder-text">ยังไม่ได้เลือกอาการ (เลือกได้จากแถบด้านซ้าย)</span>
                        </div>
                    </div>

                    <div class="predict-section">
                        <button type="submit" class="btn-predict" id="submitBtn">
                            🔮 เริ่มการทำนายความเสี่ยง
                        </button>
                    </div>
                </form>

                <div id="resultArea" style="display: none;">
                    <div class="result-grid">
                        <div class="gauge-section">
                            <div class="gauge-container">
                                <svg class="gauge" viewBox="0 0 120 120">
                                    <circle class="gauge-bg" cx="60" cy="60" r="54"></circle>
                                    <circle class="gauge-fill" cx="60" cy="60" r="54"></circle>
                                </svg>
                                <div class="gauge-value" id="riskGauge">0%</div>
                            </div>
                        </div>
                        <div class="result-info">
                            <div id="riskText" class="risk-text">กำลังประมวลผล...</div>
                            <div class="sub-info" id="analysisDetails"></div>
                            <div class="disclaimer">
                                * ผลลัพธ์นี้เป็นเพียงการวินิจฉัยเบื้องต้นโดย AI โปรดปรึกษาสัตวแพทย์หากสัตว์มีอาการรุนแรง
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>

</html>
